services:
  api:
    build: .
    container_name: flood-api
    ports:
      - "8002:8000"
    env_file:
      - .env.example
    depends_on:
      - postgres
      - influxdb

  kong:
    image: kong:3.4
    container_name: flood-kong
    depends_on:
      - api
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro

  postgres:
    image: postgis/postgis:15-3.4
    container_name: flood-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: flooddb
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7
    container_name: flood-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2

volumes:
  pg_data:
  influx_data:
