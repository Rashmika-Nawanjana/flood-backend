global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: staging
    project: floodsense

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # ── FastAPI services ──────────────────────────────────────────
  - job_name: flood-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: flood-sensor-service
    static_configs:
      - targets: ["sensor-service:8002"]
    metrics_path: /metrics

  - job_name: flood-intelligence-service
    static_configs:
      - targets: ["intelligence-service:8005"]
    metrics_path: /metrics

  - job_name: flood-zone-service
    static_configs:
      - targets: ["zone-service:8004"]
    metrics_path: /metrics

  # ── Worker / bridge services (prometheus_client HTTP servers) ──
  - job_name: flood-mqtt-kafka-bridge
    static_configs:
      - targets: ["mqtt-kafka-service:9101"]
    metrics_path: /metrics

  - job_name: flood-kafka-influx-bridge
    static_configs:
      - targets: ["kafka-influx-service:9102"]
    metrics_path: /metrics

  # ── Kong API Gateway ──────────────────────────────────────────
  - job_name: kong
    static_configs:
      - targets: ["kong:8001"]
    metrics_path: /metrics

  # ── Prometheus self-monitoring ────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
