version: "3.9"

services:
  api:
    build: .
    container_name: flood-api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - postgres
      - influxdb

  postgres:
    image: postgis/postgis:15-3.4
    container_name: flood-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: flooddb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7
    container_name: flood-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2

volumes:
  pg_data:
  influx_data:
