name: Manual Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
          - restart
          - healthcheck

jobs:
  manual-deploy:
    name: Manual Deployment Action
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: stg

      - name: Execute Deployment Action
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/flood-backend
            ACTION="${{ github.event.inputs.action }}"
            
            echo "🔨 Executing action: $ACTION"
            
            case "$ACTION" in
              deploy)
                echo "🚀 Starting deployment..."
                git fetch origin && git pull origin stg
                docker compose --env-file .env.stg -f docker-compose.stg.yml up -d
                sleep 30
                echo "✅ Deployment completed"
                ;;
              
              rollback)
                echo "⏮️ Rolling back to previous version..."
                git checkout HEAD~1
                docker compose --env-file .env.stg -f docker-compose.stg.yml down
                docker compose --env-file .env.stg -f docker-compose.stg.yml up -d
                echo "✅ Rollback completed"
                ;;
              
              restart)
                echo "🔄 Restarting services..."
                docker compose -f docker-compose.stg.yml restart
                sleep 10
                echo "✅ Services restarted"
                ;;
              
              healthcheck)
                echo "🏥 Running health checks..."
                echo ""
                echo "Kong Status:"
                curl -s http://localhost:8001/status | jq '.' || echo "Kong is not responding"
                echo ""
                echo "Service Status:"
                docker compose -f docker-compose.stg.yml ps
                ;;
            esac
            
            echo ""
            echo "📊 Current deployment state:"
            docker compose -f docker-compose.stg.yml ps

  notify:
    name: Notify Action Result
    runs-on: ubuntu-latest
    needs: manual-deploy
    if: always()
    steps:
      - name: Action Status
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "${{ needs.manual-deploy.result }}" == "success" ]; then
            echo "✅ Manual action '$ACTION' completed successfully!"
          else
            echo "❌ Manual action '$ACTION' failed!"
            exit 1
          fi
