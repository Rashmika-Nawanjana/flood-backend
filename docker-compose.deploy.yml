version: "3.9"

services:
  api:
    build: .
    container_name: flood-api
    env_file:
      - .env.example
    depends_on:
      - postgres
      - influxdb

  kong:
    image: kong:3.4
    container_name: flood-kong
    depends_on:
      - api
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/api-gateway-spec.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:80
    ports:
      - "80:80"
      - "8001:8001"
    volumes:
      - ./api-gateway-spec.yaml:/usr/local/kong/declarative/api-gateway-spec.yaml:ro

  postgres:
    image: postgis/postgis:15-3.4
    container_name: flood-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: flooddb
    volumes:
      - pg_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7
    container_name: flood-influxdb
    volumes:
      - influx_data:/var/lib/influxdb2

volumes:
  pg_data:
  influx_data:
