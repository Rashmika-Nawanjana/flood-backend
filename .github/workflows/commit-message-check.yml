name: Commit Message Check

on:
  pull_request:
    branches:
      - dev
      - stg
      - main

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PATTERN='^(feat|fix|refactor|chore|docs|test|ci|perf|revert)(\([a-z0-9._/-]+\))?: .+'

          echo "Checking commits from ${BASE_SHA} to ${HEAD_SHA}"

          invalid=0
          while IFS= read -r subject; do
            [[ -z "$subject" ]] && continue

            if [[ "$subject" == Merge* ]] || [[ "$subject" == Revert\ "* ]]; then
              continue
            fi

            if [[ ! "$subject" =~ $PATTERN ]]; then
              echo "Invalid commit message: $subject"
              invalid=1
            fi
          done < <(git log --format=%s "${BASE_SHA}..${HEAD_SHA}")

          if [[ $invalid -ne 0 ]]; then
            echo "Commit message validation failed."
            echo "Expected format: type(scope optional): short description"
            exit 1
          fi

          echo "All commit messages are valid."
