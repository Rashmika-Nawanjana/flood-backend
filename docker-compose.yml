services:
  api:
    build: .
    container_name: flood-api
    ports:
      - "${API_PORT:-8002}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-flooddb}
      INFLUXDB_URL: http://${INFLUXDB_HOST:-influxdb}:${INFLUXDB_PORT:-8086}
    depends_on:
      - postgres
      - influxdb

  sensor-service:
    build: ./sensor-service
    container_name: flood-sensor-service
    ports:
      - "${SENSOR_PORT:-8003}:8002"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-flooddb}
      INFLUXDB_URL: http://${INFLUXDB_HOST:-influxdb}:${INFLUXDB_PORT:-8086}
    depends_on:
      - postgres
      - influxdb

  intelligence-service:
    build: ./intelligence-service
    container_name: flood-intelligence-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-flooddb}
      INFLUXDB_URL: http://${INFLUXDB_HOST:-influxdb}:${INFLUXDB_PORT:-8086}
    depends_on:
      - postgres
      - influxdb

  zone-service:
    build: ./zone-service
    container_name: flood-zone-service
    ports:
      - "${ZONE_PORT:-8004}:8004"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-flooddb}
      INFLUXDB_URL: http://${INFLUXDB_HOST:-influxdb}:${INFLUXDB_PORT:-8086}
    depends_on:
      - postgres
      - influxdb

  socket-service:
    build: ./socket-service
    container_name: flood-socket-service
    ports:
      - "${SOCKET_PORT:-3001}:3001"
    environment:
      PORT: 3001
      SOCKET_PATH: /ws/live
      CORS_ORIGIN: ${ALLOWED_ORIGINS:-http://localhost:3000}
      KAFKA_URL: ws://kafka-broker:19092
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      ZONE_SERVICE_URL: http://zone-service:8004
    depends_on:
      - zone-service

  kong:
    image: kong:3.4
    container_name: flood-kong
    depends_on:
      - api
      - sensor-service
      - intelligence-service
      - zone-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/api-gateway-spec.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./api-gateway-spec.yaml:/usr/local/kong/declarative/api-gateway-spec.yaml:ro

  postgres:
    image: postgis/postgis:15-3.4
    container_name: flood-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-flooddb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  influxdb:
    image: influxdb:2.7
    container_name: flood-influxdb
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influx_data:/var/lib/influxdb2

volumes:
  pg_data:
  influx_data:
