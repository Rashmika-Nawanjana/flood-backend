_format_version: "3.0"
services:
  - name: flood-api
    url: http://api:8000
    routes:
      - name: flood-api-route
        expression: 'http.path ^= "/api"'
        strip_path: false

  - name: health-service
    url: http://api:8000
    routes:
      - name: health-route
        expression: 'http.path ^= "/health"'
        strip_path: false

  - name: flood-ws
    url: http://api:8000
    # Socket.IO at /ws/live — Kong proxies the HTTP upgrade through to the API service.
    # read_timeout/write_timeout extended so idle WS sessions aren't killed by Kong.
    read_timeout: 3600000
    write_timeout: 3600000
    routes:
      - name: flood-ws-route
        expression: 'http.path ^= "/ws"'
        strip_path: false

  - name: sensor-service
    url: http://sensor-service:8002
    routes:
      - name: sensor-service-route
        expression: '(http.path ^= "/v1/sensors") || (http.path ^= "/v1/anomalies")'
        strip_path: false
      - name: sensor-zone-anomalies-route
        expression: 'http.path ~ "^/v1/zones/[^/]+/anomalies"'
        strip_path: false

  - name: intelligence-service
    url: http://intelligence-service:8003
    routes:
      - name: intelligence-service-route
        expression: '(http.path ^= "/v1/predictions") || (http.path ^= "/v1/alerts")'
        strip_path: false
      - name: intelligence-zone-subroutes
        expression: '(http.path ~ "^/v1/zones/[^/]+/alerts") || (http.path ~ "^/v1/zones/[^/]+/predictions")'
        strip_path: false

  - name: zone-service
    url: http://zone-service:8004
    routes:
      - name: zone-service-route
        expression: '(http.path ^= "/v1/zones") || (http.path ^= "/v1/shelters")'
        strip_path: false
